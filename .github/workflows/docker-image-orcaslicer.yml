name: OrcaSlicer Docker Image CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      orca_version: ${{ steps.get-version.outputs.version }}
      needs_build: ${{ steps.check-release.outputs.needs_build }}
    steps:
      - name: Get latest OrcaSlicer release
        id: get-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(gh api repos/SoftFever/OrcaSlicer/releases/latest --jq '.tag_name')
          if [ "$VERSION" = "null" ] || [ -z "$VERSION" ]; then
            echo "::error::Failed to fetch OrcaSlicer version from GitHub API"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Latest OrcaSlicer version: $VERSION"

      - name: Check if release already exists
        id: check-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          if gh release view "$VERSION" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release $VERSION already exists, skipping build"
            echo "needs_build=false" >> $GITHUB_OUTPUT
          else
            echo "Release $VERSION not found, build needed"
            echo "needs_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.needs_build == 'true' || github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Get AppImage download URL
        id: get-appimage-url
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          URL=$(gh api repos/SoftFever/OrcaSlicer/releases/latest \
            --jq '.assets[] | select(.name | test("Ubuntu2404.*\\.AppImage$")) | .browser_download_url')
          if [ -z "$URL" ]; then
            echo "::error::Failed to find Ubuntu2404 AppImage URL"
            exit 1
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "AppImage URL: $URL"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            APPIMAGE_URL=${{ steps.get-appimage-url.outputs.url }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/kasm-orcaslicer:latest
            ghcr.io/${{ github.repository_owner }}/kasm-orcaslicer:${{ needs.check-version.outputs.orca_version }}

      - name: Create GitHub Release
        if: needs.check-version.outputs.needs_build == 'true' && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.orca_version }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.repository }}
        run: |
          gh release create "$VERSION" \
            --title "OrcaSlicer $VERSION" \
            --notes "Docker image built with OrcaSlicer $VERSION.

          Pull image:
          docker pull ghcr.io/$OWNER/kasm-orcaslicer:$VERSION" \
            --repo "$REPO"
